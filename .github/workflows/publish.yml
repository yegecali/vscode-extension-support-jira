name: Publish to VS Code Marketplace

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: xvfb-run -a npm test

      - name: Read package version
        id: package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build bundle
        run: npm run bundle

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies -o jira-ticket-classifier-${{ steps.package.outputs.version }}.vsix

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath jira-ticket-classifier-${{ steps.package.outputs.version }}.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
